{# Reusable Bootstrap movie card with lazy-loaded poster #}
<div class="{{ column_class|default('col-lg-3 col-md-4 col-sm-6 mb-4') }}">
    <div class="card movie-card h-100 shadow-sm">
        <div class="poster-wrap">
            <img
                src="{{ placeholder_poster }}"
                data-src="{{ movie.poster }}"
                class="card-img-top movie-poster lazy-poster"
                alt="{{ movie.title }}"
                loading="lazy">
            <div class="poster-spinner spinner-border text-light" role="status">
                <span class="visually-hidden">Loading poster</span>
            </div>
        </div>
        <div class="card-body d-flex flex-column text-center">
            <h6 class="card-title text-truncate" title="{{ movie.title }}">{{ movie.title }}</h6>
            <a href="{{ movie.url }}" class="btn btn-primary btn-sm mt-auto">View Details</a>
        </div>
    </div>
</div>
